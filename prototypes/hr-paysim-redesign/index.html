<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HR PaySim</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="utility-rail" aria-label="앱 도구">
        <div class="utility-logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <path d="M7 20.5c0-7.3 4.1-12 9-12s9 4.7 9 12c0 2.2-1.7 3.9-3.8 3.9-2 0-3.4-1.3-4.3-3.2-.4-.8-1.4-.8-1.8 0-.9 1.9-2.3 3.2-4.3 3.2C8.7 24.4 7 22.7 7 20.5Z" fill="currentColor" />
          </svg>
        </div>
        <button class="utility-button" type="button" aria-label="이동"><span aria-hidden="true">→</span></button>
        <button class="utility-button" type="button" aria-label="진단"><span aria-hidden="true">◎</span></button>
        <button class="utility-button" type="button" aria-label="시나리오"><span aria-hidden="true">✦</span></button>
        <button class="utility-button" type="button" aria-label="메모"><span aria-hidden="true">□</span></button>
        <button class="utility-button is-active" type="button" aria-label="HR PaySim"><span aria-hidden="true">◆</span></button>
        <button class="utility-button help" type="button" aria-label="도움말"><span aria-hidden="true">?</span></button>
      </aside>

      <section class="product-shell">
        <header class="topbar">
          <div class="brand-lockup">
            <button class="menu-button" type="button" aria-label="메뉴"><span aria-hidden="true">☰</span></button>
            <div>
              <strong>HR PaySim</strong>
              <span>보상 거버넌스 시뮬레이터</span>
            </div>
          </div>
          <nav class="topnav" aria-label="주요 화면">
            <button class="topnav-pill is-active" type="button">대시보드</button>
            <button class="topnav-pill" type="button">진단</button>
            <button class="topnav-pill" type="button">시나리오</button>
            <button class="topnav-pill" type="button">비교</button>
            <button class="topnav-pill" type="button">메모</button>
          </nav>
          <div class="topbar-actions">
            <label class="search-box">
              <span aria-hidden="true">⌕</span>
              <input type="search" placeholder="검색 (⌘K)" aria-label="검색" />
            </label>
            <button class="icon-button" type="button" data-action="reset" aria-label="처음으로">↻</button>
            <button class="icon-button" type="button" aria-label="알림">◔</button>
            <button class="icon-button" type="button" aria-label="설정">⚙</button>
            <button class="account-button" type="button" aria-label="회사 선택">
              <span class="avatar">R</span>
              <span class="account-copy">Acme Tech<br /><small>대표</small></span>
            </button>
          </div>
        </header>

        <div class="app-body">
          <aside class="flow-rail" aria-label="8단계 진행 상태">
            <nav class="stepper" id="stepper"></nav>
            <div class="status-legend" aria-label="상태 안내">
              <strong>상태 안내</strong>
              <span><i class="dot done"></i>완료</span>
              <span><i class="dot current"></i>현재</span>
              <span><i class="dot locked"></i>잠김</span>
              <span><i class="dot stale"></i>재계산 필요</span>
            </div>
          </aside>

          <main class="workspace">
            <section class="screen" id="screen" aria-live="polite"></section>
            <footer class="flow-controls">
              <button class="secondary-button" type="button" data-action="back">← 이전 단계</button>
              <div class="control-copy" id="controlCopy">필요한 내용을 확인하고 다음 단계로 이동합니다.</div>
              <button class="primary-button" type="button" data-action="next">다음으로 →</button>
            </footer>
          </main>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
